<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InsumosPrint Pro - Persistencia de Datos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            font-family: 'Urbanist', sans-serif;
            background-color: #0a0a0a;
            color: #f5f5f5;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(222, 255, 154, 0.08);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .accent-text { color: #DEFF9A; }
        .accent-bg { background-color: #DEFF9A; }
        .status-badge {
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        .status-low { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }
        .status-ok { background: rgba(34, 197, 94, 0.15); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.2); }
        .status-out { background: rgba(156, 163, 175, 0.1); color: #9ca3af; border: 1px solid rgba(156, 163, 175, 0.2); }
        
        .pulse-accent {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(222, 255, 154, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(222, 255, 154, 0); }
            100% { box-shadow: 0 0 0 0 rgba(222, 255, 154, 0); }
        }
    </style>
</head>
<body class="min-h-screen pb-12 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-zinc-900 via-black to-black">

    <nav class="sticky top-0 z-50 glass-card border-b border-white/5 px-8 py-4 flex justify-between items-center backdrop-blur-xl">
        <div class="flex items-center gap-4">
            <div class="accent-bg w-11 h-11 rounded-xl flex items-center justify-center text-black shadow-[0_0_20px_rgba(222,255,154,0.3)]">
                <i class="fa-solid fa-cloud-check text-lg"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold tracking-tight leading-none">Insumos<span class="accent-text">Print</span></h1>
                <p class="text-[10px] text-zinc-500 uppercase tracking-[0.2em] font-bold">Datos Persistentes Activos</p>
            </div>
        </div>
        <div class="flex gap-3">
            <button onclick="document.getElementById('fileInput').click()" class="pulse-accent bg-white/5 hover:bg-white/10 border border-white/10 px-5 py-2.5 rounded-xl text-xs font-bold transition-all flex items-center gap-2">
                <i class="fa-solid fa-file-export accent-text"></i> Importar Excel
            </button>
            <button onclick="resetDatabase()" class="bg-red-500/10 hover:bg-red-500/20 border border-red-500/20 px-4 py-2 rounded-xl text-[10px] font-bold transition-all text-red-400 uppercase tracking-widest">
                Vaciar Base
            </button>
            <input type="file" id="fileInput" class="hidden" accept=".xlsx, .xls, .csv">
        </div>
    </nav>

    <main class="max-w-[1400px] mx-auto px-8 mt-10">
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5 mb-10">
            <div class="glass-card p-6 rounded-3xl">
                <p class="text-zinc-500 text-[11px] uppercase tracking-widest font-bold mb-2">Items Guardados</p>
                <h3 class="text-4xl font-bold accent-text tabular-nums" id="stat-total">0</h3>
            </div>
            <div class="glass-card p-6 rounded-3xl">
                <p class="text-zinc-500 text-[11px] uppercase tracking-widest font-bold mb-2">Sin Stock</p>
                <h3 class="text-4xl font-bold text-red-400 tabular-nums" id="stat-out">0</h3>
            </div>
            <div class="glass-card p-6 rounded-3xl">
                <p class="text-zinc-500 text-[11px] uppercase tracking-widest font-bold mb-2">Marcas</p>
                <h3 class="text-4xl font-bold text-blue-400 tabular-nums" id="stat-brands">0</h3>
            </div>
            <div class="glass-card p-6 rounded-3xl">
                <p class="text-zinc-500 text-[11px] uppercase tracking-widest font-bold mb-2">Valor Total</p>
                <h3 class="text-4xl font-bold text-purple-400 tabular-nums" id="stat-value">$0</h3>
            </div>
        </div>

        <div class="flex flex-col lg:flex-row gap-5 mb-8">
            <div class="flex-grow relative">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500"></i>
                <input type="text" id="searchInput" placeholder="Buscar en la base de datos guardada..." 
                    class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-12 pr-4 focus:outline-none focus:border-[#DEFF9A]/50 transition-all text-sm">
            </div>
            <div class="w-full lg:w-64">
                <select id="brandFilter" class="w-full bg-zinc-900 border border-white/10 rounded-2xl py-4 px-6 focus:outline-none text-sm appearance-none cursor-pointer">
                    <option value="all">Todas las Marcas</option>
                </select>
            </div>
        </div>

        <div class="glass-card rounded-[2rem] overflow-hidden border border-white/5 shadow-2xl relative">
            <div id="loadingOverlay" class="hidden absolute inset-0 bg-black/95 backdrop-blur-md z-50 flex flex-col items-center justify-center text-center px-10">
                <div class="w-12 h-12 border-4 border-[#DEFF9A]/20 border-t-[#DEFF9A] rounded-full animate-spin mb-4"></div>
                <p class="text-lg font-bold accent-text mb-2" id="loadingText">Sincronizando...</p>
            </div>
            
            <div class="max-h-[600px] overflow-y-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="sticky top-0 bg-[#0a0a0a]/95 backdrop-blur-md z-20">
                        <tr class="text-[10px] uppercase tracking-[0.2em] text-zinc-500 font-black">
                            <th class="px-8 py-6 border-b border-white/5">SKU</th>
                            <th class="px-8 py-6 border-b border-white/5">Descripción</th>
                            <th class="px-8 py-6 text-center border-b border-white/5">Marca</th>
                            <th class="px-8 py-6 text-center border-b border-white/5">Stock</th>
                            <th class="px-8 py-6 text-right border-b border-white/5">Precio</th>
                            <th class="px-8 py-6 text-center border-b border-white/5">Estado</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryTable" class="divide-y divide-white/5">
                        <tr id="emptyState">
                            <td colspan="6" class="px-8 py-32 text-center">
                                <div class="flex flex-col items-center opacity-30">
                                    <i class="fa-solid fa-cloud-arrow-up text-6xl mb-6"></i>
                                    <p class="text-lg font-medium">Sin datos en memoria</p>
                                    <p class="text-xs mt-2 uppercase tracking-widest">Sube un Excel para guardar la lista</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // Clave para localStorage
        const STORAGE_KEY = 'insumos_print_db';
        let masterDatabase = new Map();

        // Sinónimos para mapeo
        const KEY_SYNONYMS = {
            id: ['SKU', 'CODIGO', 'CÓDIGO', 'ID', 'ITEM', 'REFERENCIA', 'REF'],
            desc: ['DESCRIPCION', 'DESCRIPCIÓN', 'PRODUCTO', 'ARTICULO', 'ARTÍCULO', 'INSUMO', 'DETALLE', 'NOMBRE'],
            brand: ['MARCA', 'LINEA', 'FABRICANTE', 'PROVEEDOR'],
            stock: ['STOCK', 'CANTIDAD', 'CANT', 'EXISTENCIA', 'DISPONIBLE'],
            price: ['PRECIO', 'COSTO', 'VENTA', 'VALOR', 'UNITARIO']
        };

        // Cargar datos al iniciar
        window.onload = () => {
            const savedData = localStorage.getItem(STORAGE_KEY);
            if (savedData) {
                try {
                    const parsed = JSON.parse(savedData);
                    masterDatabase = new Map(Object.entries(parsed));
                    refreshUI();
                    showNotification("Base de datos cargada desde la memoria.");
                } catch (e) {
                    console.error("Error cargando caché", e);
                }
            }
        };

        function saveData() {
            const obj = Object.fromEntries(masterDatabase);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(obj));
        }

        async function syncWithExcel(file) {
            showLoading(true, "Analizando Excel...");
            const reader = new FileReader();
            
            reader.onload = (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const sheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[sheetName];
                    const rows = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                    
                    if (rows.length < 1) {
                        showNotification("El archivo está vacío.");
                        showLoading(false);
                        return;
                    }

                    // Encontrar cabeceras
                    let headerIndex = -1;
                    for(let i=0; i < Math.min(rows.length, 15); i++) {
                        if(rows[i].some(cell => cell && KEY_SYNONYMS.id.includes(cell.toString().toUpperCase().trim()))) {
                            headerIndex = i;
                            break;
                        }
                    }

                    if(headerIndex === -1) headerIndex = rows.findIndex(r => r.length > 0);

                    const headers = rows[headerIndex].map(h => h ? h.toString().toUpperCase().trim() : "");
                    const dataRows = rows.slice(headerIndex + 1);
                    const getColIdx = (synonyms) => headers.findIndex(h => synonyms.includes(h));

                    const colMap = {
                        id: getColIdx(KEY_SYNONYMS.id) !== -1 ? getColIdx(KEY_SYNONYMS.id) : 0,
                        desc: getColIdx(KEY_SYNONYMS.desc) !== -1 ? getColIdx(KEY_SYNONYMS.desc) : 1,
                        brand: getColIdx(KEY_SYNONYMS.brand) !== -1 ? getColIdx(KEY_SYNONYMS.brand) : 2,
                        stock: getColIdx(KEY_SYNONYMS.stock) !== -1 ? getColIdx(KEY_SYNONYMS.stock) : 3,
                        price: getColIdx(KEY_SYNONYMS.price) !== -1 ? getColIdx(KEY_SYNONYMS.price) : 4
                    };

                    let added = 0, updated = 0;

                    dataRows.forEach(row => {
                        const rawId = row[colMap.id];
                        if (!rawId) return;

                        const sku = rawId.toString().trim();
                        const item = {
                            id: sku,
                            desc: (row[colMap.desc] || "SIN DESCRIPCIÓN").toString().toUpperCase(),
                            brand: (row[colMap.brand] || "GENÉRICA").toString().toUpperCase(),
                            stock: parseInt(row[colMap.stock]) || 0,
                            price: parseFloat(row[colMap.price]) || 0
                        };

                        if (masterDatabase.has(sku)) updated++; else added++;
                        masterDatabase.set(sku, item);
                    });

                    saveData(); // Persistir en localStorage
                    refreshUI();
                    showNotification(`Actualizado: ${added} nuevos, ${updated} modificados.`);
                } catch (error) {
                    showNotification("Error procesando el archivo.");
                } finally {
                    showLoading(false);
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function refreshUI() {
            const data = Array.from(masterDatabase.values());
            updateDashboard(data);
            populateBrandFilter(data);
            applyFilters();
        }

        function renderTable(data) {
            const tableBody = document.getElementById('inventoryTable');
            tableBody.innerHTML = '';
            
            if (data.length === 0 && masterDatabase.size === 0) {
                document.getElementById('emptyState').style.display = 'table-row';
                tableBody.appendChild(document.getElementById('emptyState'));
                return;
            }

            data.forEach(item => {
                const row = document.createElement('tr');
                row.className = 'hover:bg-white/[0.03] transition-all border-b border-white/5 last:border-0';
                row.innerHTML = `
                    <td class="px-8 py-5 font-mono text-[11px] accent-text font-bold">${item.id}</td>
                    <td class="px-8 py-5 font-bold text-[13px] text-zinc-100 uppercase">${item.desc}</td>
                    <td class="px-8 py-5 text-center">
                        <span class="bg-zinc-800 text-zinc-400 text-[10px] font-black px-3 py-1 rounded-full border border-white/5">${item.brand}</span>
                    </td>
                    <td class="px-8 py-5 text-center font-bold ${item.stock <= 5 ? 'text-red-400' : 'text-zinc-200'}">${item.stock}</td>
                    <td class="px-8 py-5 text-right font-black text-zinc-200">
                        ${new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', maximumFractionDigits: 0 }).format(item.price)}
                    </td>
                    <td class="px-8 py-5 text-center">
                        <span class="status-badge ${item.stock === 0 ? 'status-out' : item.stock <= 10 ? 'status-low' : 'status-ok'}">
                            ${item.stock === 0 ? 'Agotado' : item.stock <= 10 ? 'Bajo' : 'OK'}
                        </span>
                    </td>
                `;
                tableBody.appendChild(row);
            });
        }

        function updateDashboard(data) {
            document.getElementById('stat-total').innerText = data.length;
            document.getElementById('stat-out').innerText = data.filter(i => i.stock === 0).length;
            document.getElementById('stat-brands').innerText = [...new Set(data.map(i => i.brand))].length;
            const totalValue = data.reduce((acc, curr) => acc + (curr.price * curr.stock), 0);
            document.getElementById('stat-value').innerText = totalValue > 999999 ? (totalValue/1000000).toFixed(1) + "M" : (totalValue/1000).toFixed(0) + "k";
        }

        function populateBrandFilter(data) {
            const filter = document.getElementById('brandFilter');
            const current = filter.value;
            const brands = [...new Set(data.map(i => i.brand))].sort();
            filter.innerHTML = '<option value="all">Todas las Marcas</option>';
            brands.forEach(b => {
                const opt = document.createElement('option');
                opt.value = b; opt.innerText = b;
                if(b === current) opt.selected = true;
                filter.appendChild(opt);
            });
        }

        function applyFilters() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const brand = document.getElementById('brandFilter').value;
            const all = Array.from(masterDatabase.values());
            const filtered = all.filter(i => {
                const matchSearch = i.id.toString().toLowerCase().includes(term) || i.desc.toLowerCase().includes(term);
                const matchBrand = brand === 'all' || i.brand === brand;
                return matchSearch && matchBrand;
            });
            renderTable(filtered);
        }

        function resetDatabase() {
            if(confirm("¿Estás seguro? Se borrarán todos los datos guardados en este navegador.")) {
                masterDatabase.clear();
                localStorage.removeItem(STORAGE_KEY);
                refreshUI();
                showNotification("Memoria limpiada.");
            }
        }

        function showLoading(show, text = "") {
            document.getElementById('loadingOverlay').classList.toggle('hidden', !show);
            if(text) document.getElementById('loadingText').innerText = text;
        }

        function showNotification(msg) {
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-10 right-10 bg-[#DEFF9A] text-black px-6 py-4 rounded-2xl font-bold shadow-2xl z-[100] border-2 border-black/10 transition-all';
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 500);
            }, 4000);
        }

        document.getElementById('fileInput').addEventListener('change', (e) => {
            if (e.target.files.length > 0) syncWithExcel(e.target.files[0]);
        });
        document.getElementById('searchInput').addEventListener('input', applyFilters);
        document.getElementById('brandFilter').addEventListener('change', applyFilters);
    </script>
</body>
</html>
